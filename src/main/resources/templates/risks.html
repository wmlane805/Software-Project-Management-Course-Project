<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Risks</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="risks">

<div th:replace="~{navbar :: navbar}"></div>

<div class="risks-container">
    <h2>Risks</h2>

    <table class="risks-table" th:if="${not #lists.isEmpty(risks)}">
        <tr th:each="r : ${risks}">
            <td th:text="${r['title']}"></td>
            <td th:text="${r['description']}"></td>
            <td class="risks-action">
                <button th:onclick="|window.location.href='/risks/delete/' + ${r['id']} + '/' + ${projectId}|">X</button>
            </td>
        </tr>
    </table>

    <p th:if="${#lists.isEmpty(risks)}">No Risks</p>

    <form th:action="@{'/risks/add/' + ${projectId}}" method="post" class="risks-form">
        <input type="text" name="title" placeholder="Risk Title">
        <textarea name="description" placeholder="Risk Description" rows="2"></textarea>
        <button type="submit">Add Risk</button>
    </form>
</div>

</body>
</html>
