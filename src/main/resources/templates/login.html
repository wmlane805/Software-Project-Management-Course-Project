<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Manager - Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #2b2b2b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            color: white;
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo img {
            width: 120px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
        }

        hr {
            width: 250px;
            border: 1px solid #ccc;
            margin: 10px auto 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            width: 250px;
            border: none;
            border-radius: 4px;
            outline: none;
        }

        button {
            margin-top: 10px;
            padding: 8px 20px;
            border: none;
            background-color: #ccc;
            cursor: pointer;
            border-radius: 3px;
        }

        button:hover {
            background-color: #aaa;
        }

        .links {
            margin-top: 15px;
        }

        .links a {
            display: block;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
            margin-top: 5px;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <!-- Replace with your image file -->
        <img src="logo.png" alt="Logo">
    </div>

    <h1>Proj. Manager</h1>
    <hr>

    <form>
        <div class="form-group">
            <input type="text" placeholder="Username" required>
        </div>

        <div class="form-group">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="links">
        <a href="#">Forgot Password?</a>
        <a href="#">Create an account</a>
    </div>
</div>

</body>
</html>
