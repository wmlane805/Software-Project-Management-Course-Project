<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Effort Tracking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="tracking">
<div th:replace="~{navbar :: navbar}"></div>

<div class="effort-container">
    <h2>Effort Tracking</h2>

    <p th:if="${#maps.isEmpty(grouped)}">No Requirements Found</p>

    <form th:if="${not #maps.isEmpty(grouped)}" th:action="@{'/effort/save/' + ${projectId}}" method="post">
        <table class="effort-table">
            <tr>
                <th>Requirement</th>
                <th>Analysis</th>
                <th>Design</th>
                <th>Coding</th>
                <th>Testing</th>
                <th>Management</th>
            </tr>

            <tr th:each="reqEntry : ${grouped}">
                <td th:text="${reqEntry.key}"></td>
                <td>
                    <div th:each="e : ${reqEntry.value['analysis']}">
                        <span th:text="${e['member_name']}"></span>
                        <input type="number" th:name="'effort_' + ${e['id']}" th:value="${#numbers.formatDecimal(e['hours'], 1, 0)}" step="1" min="0">
                    </div>
                </td>
                <td>
                    <div th:each="e : ${reqEntry.value['design']}">
                        <span th:text="${e['member_name']}"></span>
                        <input type="number" th:name="'effort_' + ${e['id']}" th:value="${#numbers.formatDecimal(e['hours'], 1, 0)}" step="1" min="0">
                    </div>
                </td>
                <td>
                    <div th:each="e : ${reqEntry.value['coding']}">
                        <span th:text="${e['member_name']}"></span>
                        <input type="number" th:name="'effort_' + ${e['id']}" th:value="${#numbers.formatDecimal(e['hours'], 1, 0)}" step="1" min="0">
                    </div>
                </td>
                <td>
                    <div th:each="e : ${reqEntry.value['testing']}">
                        <span th:text="${e['member_name']}"></span>
                        <input type="number" th:name="'effort_' + ${e['id']}" th:value="${#numbers.formatDecimal(e['hours'], 1, 0)}" step="1" min="0">
                    </div>
                </td>
                <td>
                    <div th:each="e : ${reqEntry.value['management']}">
                        <span th:text="${e['member_name']}"></span>
                        <input type="number" th:name="'effort_' + ${e['id']}" th:value="${#numbers.formatDecimal(e['hours'], 1, 0)}" step="1" min="0">
                    </div>
                </td>
            </tr>
        </table>

        <button type="submit">Save</button>
    </form>
</div>

</body>
</html>
