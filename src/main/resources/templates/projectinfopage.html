<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Info</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #2b2b2b;
            color: white;
        }

        /* HEADER */
        .header {
            background-color: #8fa7bd;
            padding: 15px;
        }

        .logo img {
            width: 120px;
        }

        /* NAV */
        .nav {
            background-color: #1f1f1f;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .nav button {
            padding: 8px 20px;
            background-color: #ccc;
            border: none;
            cursor: pointer;
        }

        /* MAIN FORM */
        .container {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .form-box {
            background-color: #1f1f1f;
            padding: 30px;
            border-radius: 8px;
            width: 400px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
        }

        button.submit {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            background-color: #ccc;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="logo">
        <img src="logo.png">
    </div>
</div>

<div class="nav">
    <button onclick="window.location.href='/dashboard.html'">Dashboard</button>
    <button onclick="window.location.href='/projectinfopage.html'">Projects</button>
    <button onclick="window.location.href='/requirementspage.html'">Requirements</button>
    <button onclick="window.location.href='/efforttrackingpage.htmltracking'">Tracking</button>
    <button onclick="window.location.href='/projectsummarypage.htmlsummary'">Summary</button>
</div>

<div class="container">
    <div class="form-box">
        <h2>Project Information</h2>

        <div class="form-group">
            <input type="text" name="projectName" placeholder="Project Name">
        </div>

        <div class="form-group">
            <textarea name="description" placeholder="Project Description"></textarea>
        </div>

        <div class="form-group">
            <input type="text" name="owner" placeholder="Project Owner">
        </div>

        <div class="form-group">
            <input type="text" name="teamMembers" placeholder="Team Members (comma separated)">
        </div>

        <div class="form-group">
            <textarea name="risks" placeholder="Project Risks"></textarea>
        </div>

        <button class="submit">Save Project</button>
    </div>
</div>

</body>
</html>
