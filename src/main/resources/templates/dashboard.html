<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #2b2b2b;
        }

        /* TOP HEADER */
        .header {
            background-color: #8fa7bd;
            padding: 15px 20px;
            display: flex;
            align-items: center;
        }

        .logo img {
            width: 120px;
        }

        /* NAV BAR */
        .nav {
            background-color: #1f1f1f;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .nav button {
            padding: 8px 25px;
            background-color: #ccc;
            border: none;
            cursor: pointer;
        }

        .nav button:hover {
            background-color: #aaa;
        }

        /* MAIN CONTENT */
        .main {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 70vh;
        }

        .box {
            width: 200px;
            height: 200px;
            background-color: #ccc;
        }

        .circle {
            width: 300px;
            height: 300px;
            background-color: #ccc;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">
        <img src="logo.png" alt="Logo">
    </div>
</div>

<!-- NAVIGATION -->
<div class="nav">
    <button onclick="window.location.href='/dashboard.html'">Dashboard</button>
    <button onclick="window.location.href='/projectinfopage.html'">Projects</button>
    <button onclick="window.location.href='/requirementspage.html'">Requirements</button>
    <button onclick="window.location.href='/efforttrackingpage.htmltracking'">Tracking</button>
    <button onclick="window.location.href='/projectsummarypage.htmlsummary'">Summary</button>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <div class="box"></div>
    <div class="circle"></div>
</div>

<script>
    function goTo(page) {
        // For now just logs — later connect to real routes
        console.log("Navigate to:", page);

        // Example for later:
        // window.location.href = "/" + page;
    }
</script>

</body>
</html>
